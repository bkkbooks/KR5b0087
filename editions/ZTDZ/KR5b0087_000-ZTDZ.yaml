front:
  text: 黃庭内外玉景經解推十
  hash: sha256:b24d28dec5f064f28c042561e0b23a1c78368b2540866ea6e8c1ab7164a47aa0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0087_SJB_000-060541a, image: sjb/06/060541a.png}
body:
  text: 朝散大夫賜緋魚袋臣蔣慎修上進仙人章仙人道士非有神積精累氣乃成眞神无方也眞有物也无方則仙道所不能有有物故可以積累而成焉黃童内音難可聞玉書絳簡赤丹文脾部之宫中有明童故曰黄童也黃庭三叠皆以誦詠五臓不接外物故曰内音也所謂諸天隱韻蓋本諸此夫至人无所事乎聞衆人聞而不能解无所事乎聞與夫聞而不能解皆所謂難可聞也欲聞且解者无他焉賾其意而巳仙道多方然要在與陽俱升者也修鍊之精成乎純陽故其為書物之以玉玉之為物純陽之精也上清之氣下與物接故其為簡色之以絳絳之為色天道之降也所謂純陽者本乎一隂一陽修鍊而成之也以其本乎隂陽故其雜而成文則曰赤曰丹赤以火為陽丹以二為隂賾道德之意見於物色蓋如此也書載道者也簡載文者也載道以鈍陽之精載文以天道之降皆所以象其物冝也文也者分隂分陽迭用柔剛參伍錯綜以成理致於事為華於時為夏天道下濟萬化呈露於斯時也析理精微擁瑩道妙則赤丹之義於此明矣字曰眞人巾全巾能解其義則所謂積精累氣以成眞也其稱字者以道成而尊故褒其名也老子云字之曰道與此同意巾金巾者精氣所生皆首於肺故其飾如此負甲持符開七門火兵符圖備靈關負甲者北方龜蛇之屬背隂以自衛者也火兵者南方朱島之屬向陽以制敵者也七門者耳日鼻口所謂生門生門外通識性内合故荘子曰聽土於耳心止於符推此而言則知六入之用皆有符於焦牖之問者也是以開七門者必先持符持符而開則无妄作之咎矣然而持符開門又必先於負甲者以謂生門一開六賊入之所以急於自衛自衛者固則无有後艱此所以爲負甲持符開七門也符圖者河圖九宫皆我合也左三右七戴九履一二四為肩六八為足此則一身上下无所不契故可以備靈關也靈關者三關之中三才道備人配天地所以爲靈也精神盛衰生命之本内與數合外與理符則安動之愆无自而至也治國者門關用符節未有啓閉入出而不由符者也門近也關遠也近旣啓矣則遠者不可以无備此所以爲火兵符圖備靈關也前昻後卑髙下陳前昻者朱鳥之屬趨上者也後卑者龜蛇之屬趨下者也旣曰昻卑又曰髙下者昻卑位也因其昻而高之因其畢而下之人也陳謂列而布之人所為也執劒百丈舞錦幡執劎百丈言威烈之壯也舞錦幡者文採之振也此皆火兵之具也幡以表衆使人樂從是以舞之劎以勝敵使人畏服是以執之十絶盤空扇紛紜九官十色相屬而為錦根離而為絕絕者蓋以色不相屬為名其實幡也度人經所謂十絶靈幡是矣膽部云九色錦衣緑華裙者正色有五加以文章黼黻以應九宫而木出於土青黄合體其變為緑是十色也此章所論眞人之道要在驅除邪偽全其神守必使符圖之數冥契脗合外物之來无巇可抵故此十色周匝綿宻莫得其際雖有邪偽日遊其藩孰得入其舍也然猶未忘驅除之術則所謂能為不可勝以待敵之可勝也夫能為不可勝者無他術焉資乎威明之神而巳矣此所以十色全備與膽相應也然而膽屬少陽雷電八震龍旂横天蟄蟲昭蘇上下交泰故其文相屬而為錦眞人者外群乎人内成乎天獨立而不攺周行而不殆此則與物遠矣故其文相離而為絕然則上言錦憣下言十絕要其終也火鈴冠霄墜落煙火鈴膽之成聲於此言者所謂資乎威明也夫邪偽幽沈下道也火鈴飛空上道也然膽之威聲上而不下則幽沈之類得其便矣是以火鈴之勢雖飛空冠霄而以墜落為用也膽部言擲而此言墜蓋擲而墜之其義相成也煙之為物不可墜也今言墜落煙則其下擊之勢迅矣蓋火陽物也鈴隂類也火鈴者陽中有隂離象也離以上爲利以下為用此性命之理也安在黄闕兩眉間此非枝葉實是根天庭天位也黃庭地道也地道主内其勢下也以其内且下所以出而上通者必有闕焉闕者當塗而髙也兩眉之間實為天庭而黄庭之闕亦居其間是以有黃闕之名也黄關者天地徃來升降之大塗也天地訢合以産萬化則眞人之道要妙在此此所以上下配合而為二才也然黃庭位下而黃闕在上故言安在安在者疑所在也疑所在者以道无不在故也道无不在則其疑之乃所以在之也枝葉者由根出而非根也以其非根是以榮枯代謝日攺月化而根不典也眞人者歸根復命獨成其天則彼盗誇之徒文采利劎飲食貨財貪著追求有係於此皆屬枝葉所以眞人負甲持符開門備關屏絕外物廻光反照則云爲動静皆由根出而无虚妄之咎故曰實是根也紫清章紫清上皇大道君此則无為之皇有作之君總號一帝也首章離而為二此篇合而為一者以上篇論眞人之道屏絶外物廻光反照等不等觀得光分別見諦成道名為眞人故夫无為之皇有作之君總歸一帝更出互用其道微妙非思量分别之所能解唯有眞人刀能知之太玄太和俠侍端化生萬物使我仙太玄者北方玄天孳萌化物以固靈根太和者東方蒼天委和生物以逹靈芒二神俠侍尊歸一帝而仙道達矣蓋仙道雖廣要在存生故自北之東以應陽中化生之理於此備矣然四時成歲天道乃全止乎陽中特其端耳飛升十天駕玉輪晝夜七日思勿眠天數唯九今言十天則其一虚也亦猶大衍虚一妙本在焉古之眞人見諦成道妙解一帝之旨則可以超越九天之外獨遊虚一之境所謂飛升十天也飛升者與陽同波故曰玉輪玉純陽也輪下道也言乘純陽之氣自下而升焉夫陽動於下復之時也七日來復復之數也思所以上達也乗純陽而上達者非好眠之事也古人聞道淫思七日至於骨立立反眠者也然此修為之功其於眞人之道蓋原始而言之子能修之可長存積功成鍊非自然化生萬物使我仙者帝使仙也帝使仙者自然而然也是以我之我内道也子能修之可長存者學所成也學所成者非自然也是以子之子下道也夫道非自然非不自然此文獨以自然為非者所以立教也教立則學與自然同於一致是由精誠亦由專精誠而專乃積功成鍊之事也誠元疑也專不貳也无疑於物物亦應焉不貮於心神亦凝焉商丘開信妄以為實故泳河而得珠無疑而物應也佝𠉯丈人不以萬物易蜩之翼故无徃而不得不貳而神凝也學道之人存想三宫萬神應念精誠至矣然物或間之鮮不失墜故當斷滅因縁屏棄名利一心志道道可得矣内守堅固眞之眞虚中恬淡自致神内守堅固乃精誠而專之事也内守者无他求也无他求則專矣堅固者執而不捨也執而不拾則誠矣專而無他求則不失眞矣加以執而不捨則眞中之眞也然專而無他執而不捨則或蔽而不通故虚中恬淡所以救其蔽也虚中則不專於内守者也恬淡則不專於堅固者也然則内守堅固著法者也虚中恬淡離相者也非著法不足以入道非離相不足以得道得道則非求於神神自致矣百穀章百穀之實土地精五味外美邪魔腥土地精者不足以養神而可以養形也邪魔腥者不足以養形而其發聞又加穢焉加穢而云美者皆知美之為美斯惡矣不足以養神而云精者言猶有以輔其眞也以其者於土地則有親下之理其與飛升十天不可同日而語也臭亂神明胎氣零那從反老得還嬰三魂忽忽魄縻傾神明之容以清虛條達為善飲食厭飲溺於馮氣失其清虚則臭亂矣胎氣者所受於天渾淪和合生理内發自然堅凝及夫視聽食息交攻於外日鑿一竅而胎氣零矣神明臭亂日以變滅則非所以反老也胎氣散亡則非所以運嬰也魂所以為靈也神明散亂終身不靈故三魂忽忽也魄係於形者也胎氣散亡形體毁憊故魄穈傾也何不食氣太和精故能不死入黃寧人之生氣之聚也聚則為生散則為死故食氣者所以使之聚而不散也太和者少陽之氣委和而生口為其官漱咽靈液以生光華此皆生理之本不假外物自足為養故能不死也黃寕者混康之所以為康也脾部之宫清穀散氣主治百病故常運而不寧今以眞氣自養不假外物則無所主治故能寕而康也論曰前章云内守堅固眞之眞虛中恬淡自致神則是積功成鍊以成眞人故此章絕棄外物以眞氣自養則可以不死也至於初學之徒天眞未完神守未固則所以補相生理蓋亦元所不備外物之養固未可以絕棄也故天産養精而神氣叅定地産養形而膚革充盈則所籍脾胃合德致功芳澤滋榮其補大矣是以太倉明童主調百榖兼資五味推鍊致新運動無方所居之宫謂之黄庭庭者布治之地中部老君所以有為也至於積功成鍊内守堅固則百榖五味一切棄絶虚中恬淡則脾胃之宫同於虛室故其所入謂之黄寕黃寧者雖未離乎形色而近於寂然不動者矣十天眞人所以无為自然蓋本於此黄庭内外玉景經解
